<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pablo Food Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        body {
            background-color: #000;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        .menu-container {
            width: 100%;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .menu-image {
            width: 100%;
            height: auto;
            max-width: 100vw;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            object-fit: contain;
            touch-action: pan-y;
        }

        /* Mobile Optimization */
        @media screen and (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
            }
            
            .menu-image {
                width: 100vw;
                max-width: none;
            }
        }

        /* Prevent iOS zoom on input focus */
        @supports (-webkit-touch-callout: none) {
            body {
                -webkit-text-size-adjust: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <!-- Complete Combined Menu with Gold Border -->
        <img src="https://bigmodel-us3-prod-agent.cn-wlcb.ufileos.com/1776425617569-b2ddcae245d44747b9bcbfe561c80b09.jpg?ufileattname=page_1.jpg" 
             alt="Pablo Food Complete Menu" 
             class="menu-image"
             loading="eager">
    </div>

    <script>
        // Prevent double-tap zoom on mobile
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
