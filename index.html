<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Food Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow-x: hidden;
        }

        .menu-container {
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-image {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: high-quality;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <!-- Image 3: Cover Page -->
        <img src="https://z-cdn-media.chatglm.cn/files/3dc7f603-7993-48fe-8641-1ca66ad3c932.jpg?auth_key=1876379786-82127b14c1dc48189e771836b11fee7b-0-8783c21fa7d6a2d6be0c8cd42bc73404" alt="Pablo Food Menu Cover" class="menu-image">
        
        <!-- Image 1: Sandwiches Menu -->
        <img src="https://z-cdn-media.chatglm.cn/files/901562b8-9120-4a2f-a72f-11f8e28c7a96.jpg?auth_key=1876379786-9f0f3d05c5ee458bb28b9d89412fb0b9-0-502ac73a8e3b2a42cd4b83bb3ed6f985" alt="Sandwiches Menu" class="menu-image">
        
        <!-- Image 4: Burgers Menu -->
        <img src="https://z-cdn-media.chatglm.cn/files/8eac9b7d-6999-4ac7-84aa-338616cbcffb.jpg?auth_key=1876379786-8c6c2344ba4b4ea485822e32fff13f80-0-f24d23c0163dcb60138851cf1bcf2e04" alt="Burgers Menu" class="menu-image">
        
        <!-- Image 5: Pizzas Menu -->
        <img src="https://z-cdn-media.chatglm.cn/files/b753a819-4a7c-4f88-bbb1-de7bfd690cc8.jpg?auth_key=1876379786-dd9582a929a44ac08eebe6cb91f01d5f-0-33f3e0d59ccaf8831371aad35b24ef18" alt="Pizzas Menu" class="menu-image">
        
        <!-- Image 2: Steak Menu -->
        <img src="https://z-cdn-media.chatglm.cn/files/913dadee-c496-4b6f-8e97-c4d6dedce1d7.jpg?auth_key=1876379786-c727e241463d4f138d55c0b88d458d7d-0-f72ea3e91b9f462c38980ac065410b8b" alt="Steak Menu" class="menu-image">
    </div>
</body>
</html>
