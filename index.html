<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pablo Food Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }
        body {
            background-color: #000;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        .menu-container {
            width: 100%;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        .menu-image {
            width: 100%;
            height: auto;
            max-width: 100vw;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            object-fit: contain;
            touch-action: pan-y;
        }
        @media screen and (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
            }
            .menu-image {
                width: 100vw;
                max-width: none;
            }
        }
        @supports (-webkit-touch-callout: none) {
            body {
                -webkit-text-size-adjust: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <img src="meni/image_1.jpg" alt="Pablo Food Menu Page 1" class="menu-image" loading="eager">
        <img src="meni/image_2.jpg" alt="Pablo Food Menu Page 2" class="menu-image" loading="eager">
        <img src="meni/image_3.jpg" alt="Pablo Food Menu Page 3" class="menu-image" loading="eager">
        <img src="meni/image_4.jpg" alt="Pablo Food Menu Page 4" class="menu-image" loading="eager">
        <img src="meni/image_5.jpg" alt="Pablo Food Menu Page 5" class="menu-image" loading="eager">
    </div>

    <script>
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
